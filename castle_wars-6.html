<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Castle Wars - 4인 멀티</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100vw; overflow:hidden; font-family:'Courier New',monospace; color:#eee; }

/* 로비 */
#lobby { display:flex; flex-direction:column; align-items:center; gap:16px; padding:20px; }
#lobby h1 { font-size:28px; color:#ffcc44; text-shadow:0 0 20px #ffaa00; }
#lobby p { color:#aaa; font-size:13px; text-align:center; }
.lobbyBtn { background:linear-gradient(135deg,#334,#556); border:1px solid #88aaff; color:#ddeeff; font-size:14px; padding:12px 28px; cursor:pointer; border-radius:8px; font-family:'Courier New',monospace; }
.lobbyBtn:hover { background:linear-gradient(135deg,#446,#668); }
#roomInput { background:#223; border:1px solid #556; color:#eee; font-size:16px; padding:10px 16px; border-radius:6px; width:200px; text-align:center; font-family:'Courier New',monospace; }
#playerList { background:#111; border:1px solid #334; padding:10px; border-radius:6px; width:260px; min-height:80px; }
.playerItem { padding:4px 8px; font-size:12px; }
#waitMsg { color:#ffdd88; font-size:12px; text-align:center; }

/* 게임 */
#gameWrap { display:none; position:relative; width:500px; height:800px; max-width:100vw; max-height:100vh; }
canvas { display:block; width:100%!important; height:100%!important; border:2px solid #334; }

/* UI */
#ui-top { position:absolute; top:0; left:0; width:100%; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; z-index:10; gap:2px; }
#ui-bottom { position:absolute; bottom:0; left:0; width:100%; z-index:10; }
.uiPanel { background:rgba(0,0,0,0.8); border:1px solid #445; padding:5px 8px; border-radius:4px; font-size:10px; }
#hpBg { width:110px; height:8px; background:#333; border-radius:4px; overflow:hidden; margin-top:2px; }
#hpFill { height:100%; background:linear-gradient(90deg,#f00,#0f0); border-radius:4px; transition:width 0.2s; }
#minimap { border:1px solid #556; }
#shopPanel { display:flex; gap:3px; padding:3px; background:rgba(0,0,0,0.88); border-top:1px solid #445; flex-wrap:wrap; justify-content:center; pointer-events:all; }
.sBtn { background:rgba(30,30,60,0.9); border:1px solid #556; color:#ccd; font-size:8px; padding:3px 5px; cursor:pointer; border-radius:3px; white-space:nowrap; }
.sBtn:hover { background:rgba(60,60,100,0.9); }
#msgLog { position:absolute; bottom:36px; left:0; width:100%; pointer-events:none; z-index:15; }
.msgLine { color:#ffdd88; font-size:10px; text-align:center; text-shadow:1px 1px 2px #000; }
#waveInfo { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:16px; font-weight:bold; text-shadow:2px 2px 4px #000; pointer-events:none; z-index:20; display:none; text-align:center; }
#ctxMenu { position:absolute; background:rgba(0,0,0,0.92); border:1px solid #778; padding:4px; display:none; z-index:25; pointer-events:all; border-radius:4px; }
.cBtn { display:block; width:100%; background:none; border:none; color:#ddd; font-size:11px; padding:4px 10px; cursor:pointer; text-align:left; font-family:'Courier New',monospace; white-space:nowrap; }
.cBtn:hover { background:rgba(255,255,255,0.1); }
#joystickZone { position:absolute; bottom:70px; left:10px; width:110px; height:110px; z-index:30; pointer-events:all; touch-action:none; user-select:none; }
#joystickBase { position:absolute; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.3); top:5px; left:5px; }
#joystickKnob { position:absolute; width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.6),rgba(100,150,255,0.7)); border:2px solid rgba(200,220,255,0.8); top:29px; left:29px; }
#roomTag { position:absolute; top:2px; left:50%; transform:translateX(-50%); color:#aaa; font-size:9px; pointer-events:none; z-index:10; }
</style>
</head>
<body>

<!-- 로비 -->
<div id="lobby">
  <h1>🏰 Castle Wars</h1>
  <p>방 번호를 입력하고 친구들과 함께 접속하세요!<br>같은 번호로 최대 4명까지 참가 가능</p>
  <input id="roomInput" type="number" placeholder="방 번호 (예: 1234)" maxlength="6">
  <button class="lobbyBtn" id="joinBtn">🚪 입장하기</button>
  <div id="playerList"><div style="color:#666;font-size:11px;text-align:center;padding-top:10px;">방 입장 후 플레이어 목록 표시</div></div>
  <div id="waitMsg"></div>
  <button class="lobbyBtn" id="startBtn" style="display:none;background:linear-gradient(135deg,#363,#585)">⚔️ 게임 시작!</button>
</div>

<!-- 게임 -->
<div id="gameWrap">
  <canvas id="gameCanvas" width="500" height="800"></canvas>
  <div id="ui-top">
    <div class="uiPanel" style="display:flex;flex-direction:column;gap:2px;min-width:130px;">
      <div style="display:flex;justify-content:space-between;">
        <span id="hpText">HP:100/100</span>
        <span id="atkLvText" style="color:#ffcc44">Lv.1</span>
      </div>
      <div id="hpBg"><div id="hpFill" style="width:100%"></div></div>
      <div style="font-size:9px;color:#aaa;margin-top:1px">🏰 성 HP</div>
      <div id="castleHpBg" style="width:110px;height:7px;background:#333;border-radius:4px;overflow:hidden;">
        <div id="castleHpFill" style="height:100%;background:linear-gradient(90deg,#ff4400,#ffaa00);border-radius:4px;width:100%;transition:width 0.3s;"></div>
      </div>
      <div id="castleHpText" style="font-size:9px;color:#ffaa44;">2000/2000</div>
      <div id="coinText" style="color:#ffd700">🪙 0</div>
    </div>
    <div class="uiPanel" id="teammatePanel" style="display:flex;flex-direction:column;gap:3px;min-width:110px;max-width:120px;pointer-events:none;">
      <div style="font-size:8px;color:#aaa;text-align:center;">👥 팀원 HP</div>
      <div id="teammate0" style="display:none;font-size:9px;"></div>
      <div id="teammate1" style="display:none;font-size:9px;"></div>
      <div id="teammate2" style="display:none;font-size:9px;"></div>
    </div>
    <div class="uiPanel">
      <div style="font-size:8px;text-align:center;margin-bottom:1px">MAP</div>
      <canvas id="minimap" width="70" height="70"></canvas>
    </div>
  </div>
  <div id="ui-bottom">
    <div id="shopPanel">
      <button class="sBtn" id="btnAtkSpd">⚡ATK(10🪙)</button>
      <button class="sBtn" id="btnHireFollow">⚔️동행고용</button>
      <button class="sBtn" id="btnHireCastle">🏰배치고용</button>
      <button class="sBtn" id="btnCastleUp">🏰성업그레이드</button>
      <button class="sBtn" id="btnWall">🧱방벽(15)</button>
      <button class="sBtn" id="btnBomb">💣폭탄(30)</button>
      <button class="sBtn" id="btnArrow">🏹화살탑(25)</button>
      <button class="sBtn" id="btnBarracks">🏠병사소(40)</button>
      <button class="sBtn" id="btnIce">❄️얼음탑(45)</button>
      <button class="sBtn" id="btnElectric">⚡전기탑(55)</button>
    </div>
  </div>
  <div id="ctxMenu">
    <button class="cBtn" id="c1"></button>
    <button class="cBtn" id="c2"></button>
    <button class="cBtn" id="c3" style="display:none"></button>
  </div>
  <div id="msgLog"></div>
  <div id="waveInfo"></div>
  <div id="joystickZone"><div id="joystickBase"></div><div id="joystickKnob"></div></div>
  <div id="roomTag"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8ZOD5Nh-Uq5Nwn8K_ldKFnRFwsT0RE4Y",
  authDomain: "castle-cb77d.firebaseapp.com",
  projectId: "castle-cb77d",
  storageBucket: "castle-cb77d.firebasestorage.app",
  messagingSenderId: "592533154493",
  appId: "1:592533154493:web:43878c797a342f6859e5d4",
  databaseURL: "https://castle-cb77d-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 버튼 이벤트 연결
document.getElementById('joinBtn').addEventListener('click', joinRoom);
document.getElementById('startBtn').addEventListener('click', startGame);

// ====== 상수 ======
const WORLD = 5000, VIEW_W = 500, VIEW_H = 800, MINI = 70;
const SCALE = MINI / WORLD;
const GRID = 50; // 그리드 한 칸 크기 (픽셀)
const CASTLE_X = 2500, CASTLE_Y = 2500;
const CASTLE_GRID_SIZE = 4; // 성은 4×4 칸
const WALL_GRID_SIZE = 1;   // 방벽은 1×1 칸
const BUILDING_GRID_SIZE = 2; // 나머지 건물은 2×2 칸 // 공유 성 위치 (맵 정중앙)
// 모든 플레이어 성 주변 같은 위치에서 시작
const PLAYER_STARTS = [
  {x:2420, y:2580},
  {x:2580, y:2580},
  {x:2420, y:2420},
  {x:2580, y:2420},
];
const PLAYER_COLORS = ['#4488ff','#ff4444','#44cc44','#ffaa00'];
const PLAYER_NAMES = ['🔵 플레이어1','🔴 플레이어2','🟢 플레이어3','🟡 플레이어4'];

// ====== 전역 상태 ======
let myId = null, roomId = null, myIdx = -1;
let roomRef = null, playersRef = null, castleRef = null;
let remoteStates = {};
let sharedCastle = { hp: 2000, maxHp: 2000, alive: true }; // 공유 성
let canvas, ctx, miniCanvas, mCtx;

// ====== 조이스틱 ======
let joyActive = false, joyDx = 0, joyDy = 0;

// ====== 그리드 배치 상태 ======
let placingType = null;
let placingCost = 0;
let ghostX = 0, ghostY = 0;

// ====== 게임 상태 ======
let G = null;

// ====== 로비 ======
async function joinRoom() {
  const input = document.getElementById('roomInput').value.trim();
  if (!input) { alert('방 번호를 입력하세요!'); return; }
  
  document.getElementById('waitMsg').textContent = '접속 중...';
  
  try {
    roomId = input;
    myId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);

    roomRef = ref(db, `rooms/${roomId}`);
    playersRef = ref(db, `rooms/${roomId}/players`);
    castleRef = ref(db, `rooms/${roomId}/castle`);

    // 현재 플레이어 수 확인 + 오래된 데이터 정리
    const snap = await get(playersRef);
    let existingPlayers = [];
    if (snap.exists()) {
      const players = snap.val();
      // online 필드가 없거나 오래된 데이터 정리
      for (const [pid, pdata] of Object.entries(players)) {
        if (!pdata.name || pdata.name === 'undefined' || !pdata.online) {
          // 유효하지 않은 데이터 삭제
          await remove(ref(db, `rooms/${roomId}/players/${pid}`));
        } else {
          existingPlayers.push(pid);
        }
      }
    }
    if (existingPlayers.length >= 4) { alert('방이 꽉 찼어요! (최대 4명)'); return; }

    myIdx = existingPlayers.length;

    // 첫 번째 플레이어가 성 초기화
    if (existingPlayers.length === 0) {
      await set(castleRef, { hp: 2000, maxHp: 2000, alive: true });
    }
    const start = PLAYER_STARTS[myIdx];

    document.getElementById('waitMsg').textContent = `플레이어 ${myIdx+1}번으로 입장 중...`;

    // 내 정보 등록
    const myPlayerRef = ref(db, `rooms/${roomId}/players/${myId}`);
    await set(myPlayerRef, {
      idx: myIdx, name: PLAYER_NAMES[myIdx],
      x: start.x, y: start.y,
      hp: 100, maxHp: 100,
      coins: 30, atkLv: 1,
      soldiers: [], buildings: [],
      online: true
    });
    onDisconnect(myPlayerRef).remove();

    document.getElementById('waitMsg').textContent = `✅ ${PLAYER_NAMES[myIdx]}로 입장 완료!`;

    // 플레이어 목록 감시
    onValue(playersRef, (snap) => {
      if (!snap.exists()) return;
      const players = snap.val();
      const list = document.getElementById('playerList');
      list.innerHTML = '';
      Object.values(players).forEach(p => {
        const div = document.createElement('div');
        div.className = 'playerItem';
        div.style.color = PLAYER_COLORS[p.idx];
        div.textContent = p.name + (p.idx === myIdx ? ' (나)' : '');
        list.appendChild(div);
      });
      const count = Object.keys(players).length;
      document.getElementById('waitMsg').textContent = `${count}/4명 접속 중... 2명 이상이면 시작 가능!`;
      if (count >= 2) {
        document.getElementById('startBtn').style.display = 'block';
      }
      Object.entries(players).forEach(([pid, pdata]) => {
        if (pid !== myId) remoteStates[pid] = pdata;
      });
    });

  } catch(err) {
    document.getElementById('waitMsg').textContent = '❌ 오류: ' + err.message;
    alert('접속 오류: ' + err.message);
  }
}

function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameWrap').style.display = 'block';
  document.getElementById('roomTag').textContent = `방: ${roomId}`;
  initGame();

  // 페이지 닫을 때 내 데이터 삭제
  window.addEventListener('beforeunload', () => {
    if (myId && roomId) {
      // navigator.sendBeacon으로 삭제 요청 (비동기)
      remove(ref(db, `rooms/${roomId}/players/${myId}`));
    }
  });
};

// ====== 게임 초기화 ======
function initGame() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  miniCanvas = document.getElementById('minimap');
  mCtx = miniCanvas.getContext('2d');

  const start = PLAYER_STARTS[myIdx];

  // 조이스틱
  const zone = document.getElementById('joystickZone');
  const knob = document.getElementById('joystickKnob');
  const JR = 30, CX = 55, CY = 55;
  function setKnob(dx, dy) {
    const len = Math.sqrt(dx*dx+dy*dy);
    const cx2 = len>JR ? dx/len*JR : dx;
    const cy2 = len>JR ? dy/len*JR : dy;
    knob.style.left = (CX-21+cx2)+'px';
    knob.style.top  = (CY-21+cy2)+'px';
    joyDx = Math.min(1,Math.max(-1,dx/JR));
    joyDy = Math.min(1,Math.max(-1,dy/JR));
  }
  function joyStart(e){ e.preventDefault(); joyActive=true; const s=e.touches?e.touches[0]:e; const r=zone.getBoundingClientRect(); setKnob(s.clientX-r.left-CX,s.clientY-r.top-CY); }
  function joyMove(e){ if(!joyActive)return; e.preventDefault(); const s=e.touches?e.touches[0]:e; const r=zone.getBoundingClientRect(); setKnob(s.clientX-r.left-CX,s.clientY-r.top-CY); }
  function joyEnd(){ joyActive=false; joyDx=0; joyDy=0; knob.style.left=(CX-21)+'px'; knob.style.top=(CY-21)+'px'; }
  zone.addEventListener('mousedown',joyStart,{passive:false});
  zone.addEventListener('touchstart',joyStart,{passive:false});
  window.addEventListener('mousemove',joyMove,{passive:false});
  window.addEventListener('touchmove',joyMove,{passive:false});
  window.addEventListener('mouseup',joyEnd);
  window.addEventListener('touchend',joyEnd);

  // 게임 객체
  G = createGame(start);

  // 상점 버튼 이벤트
  document.getElementById('btnCastleUp').addEventListener('click', ()=>G.upgradeCastle());
  document.getElementById('btnAtkSpd').addEventListener('click', ()=>G.buyAtkSpd());
  document.getElementById('btnHireFollow').addEventListener('click', ()=>G.hire('follow'));
  document.getElementById('btnHireCastle').addEventListener('click', ()=>G.hire('castle'));
  document.getElementById('btnWall').addEventListener('click', ()=>G.buyBuilding('wall'));
  document.getElementById('btnBomb').addEventListener('click', ()=>G.buyBuilding('bomb'));
  document.getElementById('btnArrow').addEventListener('click', ()=>G.buyBuilding('arrow'));
  document.getElementById('btnBarracks').addEventListener('click', ()=>G.buyBuilding('barracks'));
  document.getElementById('btnIce').addEventListener('click', ()=>G.buyBuilding('ice'));
  document.getElementById('btnElectric').addEventListener('click', ()=>G.buyBuilding('electric'));

  // Firebase 동기화 시작
  startSync();

  // 게임 루프
  let last = 0;
  function loop(ts) {
    const dt = Math.min((ts-last)/16.67,3);
    last = ts;
    G.update(dt);
    G.draw();
    updateBuildingBtns();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(ts => { last=ts; requestAnimationFrame(loop); });
}

// ====== Firebase 동기화 ======
let syncTimer = 0;
function updateBuildingBtns(){
  if(!G) return;
  const baseCosts={wall:15,bomb:30,arrow:25,barracks:40,ice:45,electric:55};
  const labels={wall:'🧱방벽',bomb:'💣폭탄',arrow:'🏹화살탑',barracks:'🏠병사소',ice:'❄️얼음탑',electric:'⚡전기탑'};
  const ids={wall:'btnWall',bomb:'btnBomb',arrow:'btnArrow',barracks:'btnBarracks',ice:'btnIce',electric:'btnElectric'};
  for(const type of Object.keys(baseCosts)){
    const cnt = G.state.buildings.filter(b=>b.type===type).length;
    const upgradeMults = [0, 3, 6, 12, 25, 50, 100];
    const upgCost = cnt < 7 ? Math.floor(baseCosts[type] * upgradeMults[Math.min(cnt,6)]) : 99999;
    const cost = cnt === 0 ? baseCosts[type] : Math.floor(upgCost * 1.5);
    const btn = document.getElementById(ids[type]);
    if(btn) btn.textContent = `${labels[type]}(${cost}🪙)`;
  }
}

function startSync() {
  // 다른 플레이어 상태 실시간 수신
  onValue(playersRef, (snap) => {
    if (!snap.exists()) {
      remoteStates = {};
      return;
    }
    const current = snap.val();
    Object.keys(remoteStates).forEach(pid => {
      if (!current[pid]) delete remoteStates[pid];
    });
    Object.entries(current).forEach(([pid, pdata]) => {
      if (pid !== myId) remoteStates[pid] = pdata;
    });
  });

  // 공유 성 상태 실시간 수신
  onValue(castleRef, (snap) => {
    if (snap.exists()) {
      sharedCastle = snap.val();
      if (G) {
        G.state.castle.hp = sharedCastle.hp;
        G.state.castle.alive = sharedCastle.alive;
        G.state.castle.maxHp = sharedCastle.maxHp || G.state.castle.maxHp;
        G.state.castle.level = sharedCastle.level || 1;
        G.state.castle.r = 50 + ((sharedCastle.level||1) - 1) * 5;
        if(typeof G.updateCastleBtn === 'function') G.updateCastleBtn();
      }
    }
  });
}

function pushMyState() {
  if (!G || !myId) return;
  const s = G.state;
  update(ref(db, `rooms/${roomId}/players/${myId}`), {
    x: Math.round(s.player.x),
    y: Math.round(s.player.y),
    hp: Math.round(s.player.hp),
    coins: s.coins,
    atkLv: s.player.atkLv,
    soldiers: s.soldiers.slice(0,20).map(s=>({x:Math.round(s.x),y:Math.round(s.y),type:s.type,hp:s.hp,mode:s.mode})),
    buildings: s.buildings.slice(0,15).map(b=>({x:Math.round(b.x),y:Math.round(b.y),type:b.type,hp:b.hp})),
  });
}

// 성 피해를 Firebase에 전송 (절대값 대신 데미지만 전송)
function sendCastleDamage(dmg) {
  if (!castleRef) return;
  get(castleRef).then(snap => {
    if (snap.exists()) {
      const current = snap.val();
      const newHp = Math.max(0, (current.hp || 0) - dmg);
      update(castleRef, { hp: newHp, alive: newHp > 0 });
    }
  });
}

// ====== 게임 로직 ======
function createGame(start) {
  let idCnt = 0;
  const nid = () => ++idCnt;

  const state = {
    player: { x:start.x, y:start.y, hp:100, maxHp:100, speed:2.5, atkInterval:1000, atkLv:1, atkDmg:2, atkTimer:0, keys:{} },
    castle: { x:CASTLE_X, y:CASTLE_Y, hp:sharedCastle.hp, maxHp:sharedCastle.maxHp, r:50, alive:sharedCastle.alive, level: sharedCastle.level||1 },
    camera: { x:CASTLE_X-VIEW_W/2, y:CASTLE_Y-VIEW_H/2 },
    coins: 30,
    soldiers: [], buildings: [], monsters: [], projectiles: [], particles: [],
    goldMines: [], // 금광 목록
    goldMineTimer: 0, // 금광 생성 타이머
    time: 0, startTime: Date.now(),
    waveLevel: 0, spawnList:['slime'], spawnTimer:0, spawnInterval:200,
    finalEvolution: false, gameOver: false,
    syncTimer: 0,
  };

  // 성 업그레이드 데이터
  const CASTLE_LEVELS = [
    null, // 1레벨 (기본)
    {cost:100,  hp:2500, label:'Lv2(100🪙)'},

  const SDEFS = [
    {type:'arrow',name:'화살병사',cost:3, hp:60,atk:5,speed:1.5,range:150,flying:true},

  function dist(a,b){ const dx=a.x-b.x,dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
  function addCoins(n){ state.coins+=n; updateUI(); }
  function addMsg(msg,color='#ffdd88'){
    const log=document.getElementById('msgLog');
    const el=document.createElement('div'); el.className='msgLine'; el.style.color=color; el.textContent=msg;
    log.appendChild(el); setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),800)},2000);
    while(log.children.length>4) log.removeChild(log.firstChild);
  }
  function upgradeCastle(){
    const lv = state.castle.level;
    if(lv >= 7){ addMsg('성이 최대 레벨입니다!'); return; }
    const next = CASTLE_LEVELS[lv];
    if(!next) return;
    if(state.coins < next.cost){ addMsg(`코인 부족! (${next.cost}🪙 필요)`,'#f66'); return; }
    state.coins -= next.cost;
    state.castle.level = lv + 1;
    state.castle.maxHp = next.hp;
    state.castle.hp = next.hp; // 업그레이드 시 HP 풀 회복
    state.castle.r = 50 + (state.castle.level - 1) * 5; // 레벨당 크기 증가
    // Firebase에 업데이트
    update(castleRef, { hp: next.hp, maxHp: next.hp, alive: true, level: state.castle.level });
    addMsg(`🏰 성 Lv.${state.castle.level} 업그레이드! HP ${next.hp}`,'#ffcc44');
    updateUI();
    updateCastleBtn();
  }

  function upgradeBuilding(b){
    const maxLv = state.castle.level;
    const bLv = b.level || 1;
    if(bLv >= maxLv){ addMsg(`성 레벨을 먼저 올리세요! (성 Lv.${maxLv})`); return; }
    const baseCosts={wall:15,bomb:30,arrow:25,barracks:40,ice:45,electric:55};
    const base = baseCosts[b.type] || 25;
    const multipliers = [0, 3, 6, 12, 25, 50, 100];
    const cost = Math.floor(base * multipliers[bLv]);
    if(state.coins < cost){ addMsg(`코인 부족! (${cost}🪙 필요)`,'#f66'); return; }
    state.coins -= cost;
    b.level = bLv + 1;
    b.maxHp = Math.round(b.maxHp * 1.5);
    b.hp = b.maxHp;
    addMsg(`건물 Lv.${b.level} 업그레이드! (${cost}🪙)`,'#aaffaa');
    updateUI();
  }

  function updateCastleBtn(){
    const lv = state.castle.level;
    const btn = document.getElementById('btnCastleUp');
    if(lv >= 7){ btn.textContent = '🏰성 MAX레벨'; btn.disabled = true; return; }
    const next = CASTLE_LEVELS[lv];
    btn.textContent = `🏰성업그레이드(${next.cost}🪙)`;
    btn.disabled = false;
  }

  function updateUI(){
    const p=state.player;
    document.getElementById('hpText').textContent=`HP:${Math.ceil(p.hp)}/${p.maxHp}`;
    document.getElementById('hpFill').style.width=`${(p.hp/p.maxHp)*100}%`;
    document.getElementById('coinText').textContent=`🪙 ${state.coins}`;
    document.getElementById('atkLvText').textContent=`Lv.${p.atkLv}`;
    const castleRatio = Math.max(0, state.castle.hp / state.castle.maxHp);
    document.getElementById('castleHpFill').style.width=`${castleRatio*100}%`;
    document.getElementById('castleHpText').textContent=`${Math.ceil(state.castle.hp)}/${state.castle.maxHp}`;
    // 팀원 HP 업데이트
    const teammates = Object.values(remoteStates).filter(r=>r.hp!==undefined);
    for(let i=0;i<3;i++){
      const el=document.getElementById(`teammate${i}`);
      if(i<teammates.length){
        const t=teammates[i];
        const ratio=Math.max(0,(t.hp||0)/100);
        const color=PLAYER_COLORS[t.idx||0];
        el.style.display='block';
        el.innerHTML=`<span style="color:${color}">${PLAYER_NAMES[t.idx||0].slice(0,6)}</span>
          <div style="width:90px;height:6px;background:#333;border-radius:3px;overflow:hidden;margin-top:1px;">
            <div style="width:${ratio*100}%;height:100%;background:${color};border-radius:3px;transition:width 0.3s;"></div>
          </div>
          <span style="color:#aaa;font-size:8px;">${Math.ceil(t.hp||0)}/100</span>`;
      } else {
        el.style.display='none';
      }
    }
  }
  function showWave(txt){
    const el=document.getElementById('waveInfo'); el.innerHTML=txt; el.style.display='block'; el.style.opacity='1';
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',600)},2500);
  }
  function spawnMonster(type){
    const def=MDEFS[type]; if(!def) return;
    const side=Math.floor(Math.random()*4);
    let sx,sy; const m=80;
    if(side===0){sx=Math.random()*WORLD;sy=-m;}
    else if(side===1){sx=WORLD+m;sy=Math.random()*WORLD;}
    else if(side===2){sx=Math.random()*WORLD;sy=WORLD+m;}
    else{sx=-m;sy=Math.random()*WORLD;}
    const mul=state.finalEvolution?2:1;
    const elapsed2=(Date.now()-state.startTime)/1000;
    // 시간이 지날수록 속도 증가 (1분마다 5%, 최대 2배)
    const speedMul = Math.min(2.0, 1 + elapsed2/60*0.05);
    state.monsters.push({x:sx,y:sy,hp:def.hp*mul,maxHp:def.hp*mul,atk:def.atk*mul,speed:def.speed*speedMul,reward:def.reward,r:def.r*(state.finalEvolution?1.4:1),flying:def.flying,type,color:def.color,atkTimer:0,id:nid(),frozen:0,shocked:0});
  }
  function destroyCastle(){
    state.castle.hp=0; state.castle.alive=false;
    update(castleRef,{hp:0,alive:false});
    state.gameOver=true;
    addMsg('💀 성이 함락됐습니다! GAME OVER','#ff4444');
  }
  function spawnParticles(x,y,color){
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2; state.particles.push({x,y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5-1,life:25,maxLife:25,color});}
  }

  // 공개 메서드
  function buyAtkSpd(){
    if(state.player.atkLv>=5){addMsg('최대 레벨!');return;}
    if(state.coins<10){addMsg('코인 부족!','#f66');return;}
    state.coins-=10; state.player.atkLv++; state.player.atkInterval-=100;
    addMsg(`⚡ ATK Lv.${state.player.atkLv}!`,'#afa'); updateUI();
  }
  function hire(mode){
    document.getElementById('ctxMenu').style.display='block';
    document.getElementById('ctxMenu').style.left='50%';
    document.getElementById('ctxMenu').style.top='35%';
    document.getElementById('ctxMenu').style.transform='translate(-50%,-50%)';
    // 성 레벨에 따른 배치 한도: 1레벨=5명, 레벨당 +3명
    const castleMax = 5 + (state.castle.level - 1) * 3;
    const max = mode==='follow' ? 10 : castleMax;
    const cur=state.soldiers.filter(s=>s.mode===mode).length;
    ['c1','c2','c3'].forEach((id,i)=>{
      const btn=document.getElementById(id);
      const def=SDEFS[i];
      btn.style.display='block';
      btn.textContent=`${def.name} (${def.cost}🪙) [${cur}/${max}]`;
      btn.onclick=()=>hireSoldier(def.type,mode);
    });
  }
  function hireSoldier(type,mode){
    const def=SDEFS.find(s=>s.type===type);
    const castleMax = 5 + (state.castle.level - 1) * 3;
    const max=mode==='follow'?10:castleMax;
    if(state.soldiers.filter(s=>s.mode===mode).length>=max){addMsg(`최대 ${max}명! (성 Lv.${state.castle.level})`);return;}
    if(state.coins<def.cost){addMsg('코인 부족!','#f66');return;}
    state.coins-=def.cost;
    const a=Math.random()*Math.PI*2;
    const sx=mode==='follow'?state.player.x+Math.cos(a)*30:state.castle.x+Math.cos(a)*60;
    const sy=mode==='follow'?state.player.y+Math.sin(a)*30:state.castle.y+Math.sin(a)*60;

    // 건물 근처 배치 시 건물 레벨 기준 제한 체크
    if(mode==='castle'){
      // 가장 가까운 건물 찾기
      let nearBuilding = null, nearD = 80;
      for(const b of state.buildings){
        const d = dist(state.player, b);
        if(d < nearD){ nearD = d; nearBuilding = b; }
      }
      if(nearBuilding){
        const bLv = nearBuilding.level || 1;
        const bMax = 3 + (bLv - 1) * 2; // 1레벨=3명, 레벨당+2명
        const nearCount = state.soldiers.filter(s => s.mode==='castle' && dist(s, nearBuilding) < 80).length;
        if(nearCount >= bMax){ addMsg(`건물 주변 최대 ${bMax}명! (건물 Lv.${bLv})`); return; }
      }
    }
    state.soldiers.push({x:sx,y:sy,hp:def.hp,maxHp:def.hp,type:def.type,atk:def.atk,speed:def.speed,range:def.range,flying:def.flying,mode,atkTimer:0,id:nid()});
    addMsg(`${def.name} 고용!`,'#afa'); updateUI();
    document.getElementById('ctxMenu').style.display='none';
  }
  function buyBuilding(type){
    if(!state.castle.alive){addMsg('성이 없음!','#f66');return;}
    const baseCosts={wall:15,bomb:30,arrow:25,barracks:40,ice:45,electric:55};
    const base = baseCosts[type];
    const sameCount = state.buildings.filter(b=>b.type===type).length;
    // 업그레이드 비용 기준: base * [3,6,12,25,50,100]
    // 추가 구매는 해당 레벨 업그레이드보다 항상 비싸게 (×1.5배)
    const upgradeMults = [0, 3, 6, 12, 25, 50, 100];
    const upgCost = sameCount < 7 ? Math.floor(base * upgradeMults[Math.min(sameCount, 6)]) : 99999;
    const cost = sameCount === 0 ? base : Math.floor(upgCost * 1.5);
    if(state.coins < cost){addMsg(`코인 부족! (${cost}🪙 필요)`,'#f66');return;}
    placingType = type;
    placingCost = cost;
    ghostX = state.player.x;
    ghostY = state.player.y;
    const nextCost = Math.floor(base * upgradeMults[Math.min(sameCount+1, 6)] * 1.5);
    addMsg(`📍 설치(${cost}🪙) | 업그레이드는 ${upgCost}🪙`,'#ffdd88');
  }

  function placeBuilding(wx, wy){
    const type = placingType;
    if(!type) return;
    const costs={wall:15,bomb:30,arrow:25,barracks:40,ice:45,electric:55};
    const gs = GRID;
    const gridX = Math.round(wx / gs) * gs;
    const gridY = Math.round(wy / gs) * gs;
    const gridSize = type==='wall' ? WALL_GRID_SIZE : BUILDING_GRID_SIZE;
    const newR = (gridSize * gs) / 2;

    // 중복 설치 체크
    for(const b of state.buildings){
      const bGridSize = b.gridSize || (b.type==='wall' ? WALL_GRID_SIZE : BUILDING_GRID_SIZE);
      const bR = (bGridSize * gs) / 2;
      const minDist = newR + bR;
      if(dist({x:gridX,y:gridY}, b) < minDist){
        addMsg('이미 건물이 있어요!','#f66');
        return;
      }
    }
    // 성과도 겹침 체크
    if(dist({x:gridX,y:gridY}, state.castle) < newR + state.castle.r){
      addMsg('성과 겹칩니다!','#f66');
      return;
    }

    const hps={wall:200,bomb:200,arrow:180,barracks:120,ice:220,electric:240};
    state.coins -= placingCost;
    state.buildings.push({x:gridX, y:gridY, type, hp:hps[type], maxHp:hps[type], r:newR, atkTimer:0, id:nid(), level:1, gridSize});
    addMsg(`${type} 건설!`,'#aaf');
    placingType = null;
    updateUI();
  }
  function rebuild(){
    if(state.castle.alive){addMsg('성이 있음!');return;}
    if(state.coins<100){addMsg('코인 부족!(100필요)','#f66');return;}
    state.coins-=100;
    state.castle.hp=state.castle.maxHp;
    state.castle.alive=true;
    // Firebase에도 반영
    update(castleRef,{hp:state.castle.maxHp,alive:true});
    addMsg('🏰 성 재건!','#ffcc44'); updateUI();
  }

  // ===== UPDATE =====
  function update(dt){
    if(state.gameOver) return;
    state.time+=dt; state.syncTimer+=dt;
    const elapsed=(Date.now()-state.startTime)/1000;

    // Final evolution
    if(elapsed>=720&&!state.finalEvolution){
      state.finalEvolution=true; showWave('⚠️ FINAL EVOLUTION!'); state.spawnInterval=50;
    }
    // Wave
    const wt=Math.floor(elapsed/120);
    if(wt>state.waveLevel){
      state.waveLevel=wt;
      const wTypes=['slime','swordslime','fireslime','bat','golem','dragon'];
      const nt=wTypes[Math.min(wt,wTypes.length-1)];
      if(!state.spawnList.includes(nt)){state.spawnList.push(nt);showWave(`🌊 웨이브${wt}: ${MDEFS[nt]?'새 적':'?'}출현!`);}
    }
    // Spawn
    state.spawnTimer+=dt;
    // 시간이 지날수록 스폰 수 증가 (2분마다 +1, 최대 5마리)
    const spawnCount = state.finalEvolution ? 5 : Math.min(5, 1 + Math.floor(elapsed/120));
    if(state.spawnTimer>=state.spawnInterval){
      state.spawnTimer=0;
      for(let i=0;i<spawnCount;i++) spawnMonster(state.spawnList[Math.floor(Math.random()*state.spawnList.length)]);
    }

    // 금광 생성 (30초마다, 최대 3개)
    state.goldMineTimer += dt;
    if(state.goldMineTimer >= 30*60){ // 30초 = 30*60프레임
      state.goldMineTimer = 0;
      if(state.goldMines.length < 3){
        // 성에서 최소 500px 이상 떨어진 랜덤 위치
        let gx, gy, tries=0;
        do {
          gx = 200 + Math.random() * (WORLD-400);
          gy = 200 + Math.random() * (WORLD-400);
          tries++;
        } while(Math.sqrt((gx-CASTLE_X)**2+(gy-CASTLE_Y)**2) < 500 && tries < 20);
        state.goldMines.push({
          x:gx, y:gy,
          reward: 30 + Math.floor(Math.random()*50), // 30~80코인
          id:nid(),
          glowTimer:0
        });
        addMsg('💰 새 금광이 발견됐습니다!','#ffd700');
      }
    }

    // 금광 수집 (플레이어가 가까이 가면)
    for(let i=state.goldMines.length-1;i>=0;i--){
      const g=state.goldMines[i];
      g.glowTimer = (g.glowTimer||0) + dt;
      if(dist(state.player, g) < 30){
        addCoins(g.reward);
        spawnParticles(g.x, g.y, '#ffd700');
        addMsg(`💰 금광 획득! +${g.reward}🪙`,'#ffd700');
        state.goldMines.splice(i,1);
      }
    }
    let dx=0,dy=0;
    if(p.keys['w']||p.keys['arrowup']) dy-=p.speed;
    if(p.keys['s']||p.keys['arrowdown']) dy+=p.speed;
    if(p.keys['a']||p.keys['arrowleft']) dx-=p.speed;
    if(p.keys['d']||p.keys['arrowright']) dx+=p.speed;
    if(joyActive||joyDx!==0||joyDy!==0){ dx+=joyDx*p.speed; dy+=joyDy*p.speed; }
    p.x=Math.max(10,Math.min(WORLD-10,p.x+dx));
    p.y=Math.max(10,Math.min(WORLD-10,p.y+dy));

    // Castle heal
    if(state.castle.alive&&dist(p,state.castle)<120) p.hp=Math.min(p.maxHp,p.hp+5*(dt/60));

    // Camera lerp
    const cam=state.camera;
    cam.x+=(p.x-VIEW_W/2-cam.x)*0.1;
    cam.y+=(p.y-VIEW_H/2-cam.y)*0.1;
    cam.x=Math.max(0,Math.min(WORLD-VIEW_W,cam.x));
    cam.y=Math.max(0,Math.min(WORLD-VIEW_H,cam.y));

    // Player attack
    p.atkTimer+=dt;
    if(p.atkTimer>=p.atkInterval/16.67){
      p.atkTimer=0;
      let near=null,nearD=200;
      for(const m of state.monsters){if(m.flying)continue;const d=dist(p,m);if(d<nearD){nearD=d;near=m;}}
      if(near){const vx=(near.x-p.x)/nearD*6,vy=(near.y-p.y)/nearD*6;state.projectiles.push({x:p.x,y:p.y,vx,vy,dmg:p.atkDmg,owner:'player',flying:false,id:nid()});}
    }

    // Soldiers
    for(let i=state.soldiers.length-1;i>=0;i--){
      const s=state.soldiers[i];
      if(s.hp<=0){state.soldiers.splice(i,1);continue;}
      if(s.mode==='follow'){
        const fi=state.soldiers.filter(x=>x.mode==='follow');
        const a=(fi.indexOf(s)/(fi.length||1))*Math.PI*2;
        const tx=p.x+Math.cos(a)*35, ty=p.y+Math.sin(a)*35;
        const dd=dist(s,{x:tx,y:ty});
        if(dd>5){s.x+=(tx-s.x)/dd*s.speed;s.y+=(ty-s.y)/dd*s.speed;}
      } else if(state.castle.alive){
        const ci=state.soldiers.filter(x=>x.mode==='castle');
        const a=(ci.indexOf(s)/(ci.length||1))*Math.PI*2;
        const tx=state.castle.x+Math.cos(a)*55,ty=state.castle.y+Math.sin(a)*55;
        const dd=dist(s,{x:tx,y:ty});
        if(dd>5){s.x+=(tx-s.x)/dd*s.speed;s.y+=(ty-s.y)/dd*s.speed;}
      }
      s.atkTimer+=dt;
      if(s.atkTimer>=60){
        s.atkTimer=0;
        let near=null,nearD=s.range;
        for(const m of state.monsters){if(m.flying&&!s.flying)continue;const d=dist(s,m);if(d<nearD){nearD=d;near=m;}}
        if(near){const vx=(near.x-s.x)/nearD*5,vy=(near.y-s.y)/nearD*5;state.projectiles.push({x:s.x,y:s.y,vx,vy,dmg:s.atk,owner:'soldier',flying:s.flying,id:nid()});}
      }
    }

    // Buildings
    for(let i=state.buildings.length-1;i>=0;i--){
      const b=state.buildings[i];
      if(b.hp<=0){state.buildings.splice(i,1);continue;}
      if(b.type==='wall')continue;
      b.atkTimer+=dt;
      const intv=b.type==='bomb'?180:90;
      if(b.atkTimer>=intv){
        b.atkTimer=0;
        const canFly=b.type==='arrow'||b.type==='barracks';
        const tgts=state.monsters.filter(m=>(!m.flying||canFly)&&dist(b,m)<160).sort((a,c)=>dist(b,a)-dist(b,c));
        if(b.type==='arrow'){for(let t=0;t<Math.min(3,tgts.length);t++){const m=tgts[t];const d=dist(b,m);state.projectiles.push({x:b.x,y:b.y,vx:(m.x-b.x)/d*7,vy:(m.y-b.y)/d*7,dmg:8,owner:'building',flying:true,id:nid()});}}
        else if(b.type==='bomb'&&tgts.length>0){const m=tgts[0];const d=dist(b,m);state.projectiles.push({x:b.x,y:b.y,vx:(m.x-b.x)/d*4,vy:(m.y-b.y)/d*4,dmg:25,owner:'building',flying:false,aoe:40,id:nid()});}
        else if(b.type==='ice'&&tgts.length>0){const m=tgts[0];const d=dist(b,m);state.projectiles.push({x:b.x,y:b.y,vx:(m.x-b.x)/d*6,vy:(m.y-b.y)/d*6,dmg:15,owner:'building',flying:true,freeze:true,id:nid()});}
        else if(b.type==='electric'){for(let t=0;t<Math.min(4,tgts.length);t++){const m=tgts[t];const d=dist(b,m);state.projectiles.push({x:b.x,y:b.y,vx:(m.x-b.x)/d*9,vy:(m.y-b.y)/d*9,dmg:20,owner:'building',flying:true,shock:true,id:nid()});}}
      }
    }

    // Monsters
    for(let i=state.monsters.length-1;i>=0;i--){
      const m=state.monsters[i];
      if(m.hp<=0){addCoins(m.reward);spawnParticles(m.x,m.y,'#ffdd44');state.monsters.splice(i,1);continue;}
      // 가장 가까운 타겟 (내 성 or 내 플레이어 or 다른 플레이어 성)
      let tx=state.castle.alive?state.castle.x:p.x, ty=state.castle.alive?state.castle.y:p.y;
      let bestD=dist(m,{x:tx,y:ty});
      if(dist(m,p)<bestD){tx=p.x;ty=p.y;bestD=dist(m,p);}
      // 다른 플레이어 성도 타겟
      Object.values(remoteStates).forEach(rp=>{
        if(rp.castleAlive){const d=dist(m,{x:rp.castleX,y:rp.castleY});if(d<bestD){tx=rp.castleX;ty=rp.castleY;bestD=d;}}
      });
      const dd=dist(m,{x:tx,y:ty});
      // 얼음: 속도 0.2배, 전기: 속도 0.5배
      let spd=m.speed;
      if(m.frozen>0){m.frozen-=dt;spd*=0.2;}
      else if(m.shocked>0){m.shocked-=dt;spd*=0.5;}
      if(dd>m.r+5){m.x+=(tx-m.x)/dd*spd;m.y+=(ty-m.y)/dd*spd;}
      // 건물 충돌 (공중 유닛 제외) - 방벽은 더 강하게
      if(!m.flying){
        for(const b of state.buildings){
          const gridSize = b.gridSize || (b.type==='wall' ? WALL_GRID_SIZE : BUILDING_GRID_SIZE);
          const wallR = (gridSize * GRID) / 2;
          const bd=dist(m,b);
          const minD=m.r + wallR;
          if(bd < minD && bd > 0){
            const push = (minD - bd) / bd * (b.type==='wall' ? 2.5 : 1.2);
            m.x += (m.x - b.x) * push;
            m.y += (m.y - b.y) * push;
          }
        }
      }
      m.atkTimer+=dt;
      if(m.atkTimer>=90){
        m.atkTimer=0;
        if(dist(m,p)<m.r+20){p.hp-=m.atk;if(p.hp<=0){p.hp=0;state.gameOver=true;}}
        if(state.castle.alive&&dist(m,state.castle)<m.r+state.castle.r){
          sendCastleDamage(m.atk);
        }
        for(const b of state.buildings){if(dist(m,b)<m.r+b.r)b.hp-=m.atk*0.5;}
      }
    }

    // Projectiles
    for(let i=state.projectiles.length-1;i>=0;i--){
      const proj=state.projectiles[i];
      proj.x+=proj.vx; proj.y+=proj.vy;
      if(proj.x<0||proj.x>WORLD||proj.y<0||proj.y>WORLD){state.projectiles.splice(i,1);continue;}
      let hit=false;
      for(let j=state.monsters.length-1;j>=0;j--){
        const m=state.monsters[j];
        if(m.flying&&!proj.flying)continue;
        if(dist(proj,m)<m.r+5){
          if(proj.aoe){for(const m2 of state.monsters)if(dist(proj,m2)<proj.aoe)m2.hp-=proj.dmg;spawnParticles(proj.x,proj.y,'#ff8800');}
          else{ m.hp-=proj.dmg; if(proj.freeze){m.frozen=180;spawnParticles(m.x,m.y,'#88ddff');} if(proj.shock){m.shocked=90;spawnParticles(m.x,m.y,'#ffff44');} }
          hit=true;break;
        }
      }
      if(hit){state.projectiles.splice(i,1);}
    }

    // Particles
    for(let i=state.particles.length-1;i>=0;i--){
      const pt=state.particles[i];
      pt.x+=pt.vx;pt.y+=pt.vy;pt.life-=dt;pt.vy-=0.02;
      if(pt.life<=0)state.particles.splice(i,1);
    }

    // Firebase sync (매 6프레임마다)
    state.syncTimer+=dt;
    if(state.syncTimer>=6){state.syncTimer=0;pushMyState();}

    updateUI();
  }

  // ===== DRAW =====
  function drawHpBar(cx,cy,w,hp,max){
    ctx.fillStyle='#222'; ctx.fillRect(cx-w/2,cy,w,5);
    const r=Math.max(0,hp/max); ctx.fillStyle=r>0.5?'#4f4':r>0.25?'#fa0':'#f44';
    ctx.fillRect(cx-w/2,cy,w*r,5);
    ctx.strokeStyle='#555'; ctx.lineWidth=0.5; ctx.strokeRect(cx-w/2,cy,w,5);
  }
  function toScreen(wx,wy){ return [wx-state.camera.x, wy-state.camera.y]; }
  function inView(wx,wy,m=60){ const [sx,sy]=toScreen(wx,wy); return sx>-m&&sx<VIEW_W+m&&sy>-m&&sy<VIEW_H+m; }

  function drawSlime(cx,cy,r,color,variant){
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,0,false); ctx.lineTo(cx+r,cy+r*0.4); ctx.quadraticCurveTo(cx,cy+r*0.8,cx-r,cy+r*0.4); ctx.closePath();
    if(variant==='fire'){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'#ffdd00');g.addColorStop(0.5,'#ff6600');g.addColorStop(1,'#cc0000');ctx.fillStyle=g;}
    else ctx.fillStyle=color;
    ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.1,r*0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.3,cy-r*0.1,r*0.15,0,Math.PI*2);ctx.fill();
    if(variant==='sword'){ctx.fillStyle='#aaa';ctx.fillRect(cx+r*0.9,cy-r*0.8,r*0.2,r*1.2);}
    if(variant==='fire'){for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx+i*r*0.3,cy-r*0.9);ctx.lineTo(cx+i*r*0.3-r*0.15,cy-r*0.5);ctx.lineTo(cx+i*r*0.3+r*0.15,cy-r*0.5);ctx.closePath();ctx.fillStyle='#ff9900';ctx.fill();}}
    ctx.restore();
  }
  function drawBat(cx,cy,r){
    ctx.save();ctx.fillStyle='#442266';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx-r*2,cy-r*0.5);ctx.lineTo(cx-r*1.5,cy+r*0.3);ctx.lineTo(cx-r*0.8,cy+r*0.2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*2,cy-r*0.5);ctx.lineTo(cx+r*1.5,cy+r*0.3);ctx.lineTo(cx+r*0.8,cy+r*0.2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#6633aa';ctx.fill();ctx.strokeStyle='#aa77ff';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(cx-r*0.35,cy-r*0.1,r*0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.35,cy-r*0.1,r*0.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function drawGolem(cx,cy,r){
    ctx.save();
    const pts=[];for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/8;pts.push([cx+Math.cos(a)*r,cy+Math.sin(a)*r]);}
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(const p2 of pts)ctx.lineTo(p2[0],p2[1]);ctx.closePath();
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'#aaa');g.addColorStop(1,'#555');
    ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
    ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-r*0.3,cy-r*0.5);ctx.lineTo(cx+r*0.1,cy+r*0.2);ctx.stroke();
    ctx.fillStyle='#f60';ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.1,r*0.18,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.3,cy-r*0.1,r*0.18,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function drawDragon(cx,cy,r){
    ctx.save();
    ctx.fillStyle='rgba(180,0,0,0.7)';
    ctx.beginPath();ctx.moveTo(cx-r*0.5,cy);ctx.bezierCurveTo(cx-r*2.5,cy-r*1.5,cx-r*3,cy+r,cx-r*1.5,cy+r*0.5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+r*0.5,cy);ctx.bezierCurveTo(cx+r*2.5,cy-r*1.5,cx+r*3,cy+r,cx+r*1.5,cy+r*0.5);ctx.closePath();ctx.fill();
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.2);bg.addColorStop(0,'#cc3300');bg.addColorStop(1,'#660000');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(cx,cy,r*1.3,r*0.9,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ff4400';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#dd2200';ctx.beginPath();ctx.ellipse(cx-r*1.1,cy-r*0.1,r*0.6,r*0.45,-0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(cx-r*1.25,cy-r*0.1,r*0.15,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function drawSoldier(cx,cy,r,type){
    ctx.save();
    const colors={arrow:'#5588cc',spear:'#cc8844',fire:'#cc4400'};
    ctx.fillStyle=colors[type]||'#5588cc';
    ctx.fillRect(cx-r*0.6,cy-r*0.3,r*1.2,r*1.1);
    ctx.beginPath();ctx.arc(cx,cy-r*0.35,r*0.55,Math.PI,0,false);ctx.fill();
    ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(cx,cy-r*0.1,r*0.3,0,Math.PI*2);ctx.fill();
    if(type==='arrow'){ctx.strokeStyle='#884400';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx+r*0.9,cy,r*0.7,-0.8,0.8);ctx.stroke();}
    else if(type==='spear'){ctx.strokeStyle='#884400';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,cy-r*0.5);ctx.lineTo(cx,cy+r*1.5);ctx.stroke();}
    else{ctx.strokeStyle='#882200';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+r*0.5,cy);ctx.lineTo(cx+r*1.3,cy-r*0.7);ctx.stroke();ctx.beginPath();ctx.arc(cx+r*1.4,cy-r*0.8,r*0.25,0,Math.PI*2);ctx.fillStyle='#ff6600';ctx.fill();}
    ctx.restore();
  }
  function drawCastle(cx,cy,r,hp,maxHp,alive,color){
    ctx.save();
    const bc=alive?(color||'#886644'):'#443322';
    ctx.fillStyle=bc;ctx.fillRect(cx-r,cy-r*0.5,r*2,r*1.3);
    [{x:cx-r*0.7},{x:cx},{x:cx+r*0.7}].forEach(t=>{
      ctx.fillStyle=alive?'#665533':'#332211';ctx.fillRect(t.x-r*0.2,cy-r*1.3,r*0.4,r*0.9);
      ctx.beginPath();ctx.moveTo(t.x,cy-r*1.6);ctx.lineTo(t.x-r*0.2,cy-r*1.3);ctx.lineTo(t.x+r*0.2,cy-r*1.3);ctx.closePath();ctx.fillStyle='#aa7755';ctx.fill();
    });
    ctx.fillStyle='#221100';ctx.beginPath();ctx.arc(cx,cy+r*0.3,r*0.25,Math.PI,0,false);ctx.lineTo(cx+r*0.25,cy+r*0.8);ctx.lineTo(cx-r*0.25,cy+r*0.8);ctx.closePath();ctx.fill();
    if(alive) drawHpBar(cx,cy-r*2,r*2.2,hp,maxHp);
    else{ctx.fillStyle='rgba(255,100,0,0.4)';ctx.fillRect(cx-r,cy-r*0.5,r*2,r*1.3);}
    ctx.restore();
  }
  function drawPlayer(cx,cy,r,color){
    ctx.save();
    ctx.fillStyle=color||'#4466cc';ctx.fillRect(cx-r*0.45,cy-r*0.2,r*0.9,r*0.85);
    ctx.fillStyle='#aabbdd';ctx.beginPath();ctx.arc(cx,cy-r*0.25,r*0.5,Math.PI,0,false);ctx.fill();ctx.fillRect(cx-r*0.5,cy-r*0.28,r,r*0.15);
    ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(cx,cy,r*0.28,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ddd';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx+r*0.7,cy-r*0.6);ctx.lineTo(cx+r*0.7,cy+r*0.8);ctx.stroke();
    ctx.restore();
  }

  function draw(){
    if(state.gameOver){
      ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,VIEW_W,VIEW_H);
      ctx.fillStyle='#ff4444';ctx.font='bold 24px serif';ctx.textAlign='center';
      ctx.fillText('💀 성이 함락됐습니다!',VIEW_W/2,VIEW_H/2-30);
      ctx.fillStyle='#ffcc44';ctx.font='16px Courier New';
      ctx.fillText('GAME OVER',VIEW_W/2,VIEW_H/2+5);
      ctx.fillStyle='#aaa';ctx.font='12px Courier New';
      ctx.fillText('새로고침으로 다시 시작',VIEW_W/2,VIEW_H/2+35);
      return;
    }
    const cam=state.camera;
    ctx.clearRect(0,0,VIEW_W,VIEW_H);
    ctx.fillStyle='#1a2a1a';ctx.fillRect(0,0,VIEW_W,VIEW_H);
    // 그리드
    ctx.strokeStyle='rgba(100,150,100,0.12)';ctx.lineWidth=1;
    const gs=100,sx=-(cam.x%gs),sy2=-(cam.y%gs);
    for(let x=sx;x<VIEW_W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,VIEW_H);ctx.stroke();}
    for(let y=sy2;y<VIEW_H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(VIEW_W,y);ctx.stroke();}

    // 배치 모드 그리드 표시
    if(placingType){
      const gs=GRID;
      const gridSize = placingType==='wall' ? WALL_GRID_SIZE : BUILDING_GRID_SIZE;
      const gPx = gridSize * gs;
      // 그리드 선
      ctx.strokeStyle='rgba(100,200,255,0.25)'; ctx.lineWidth=0.5;
      const startX=-((cam.x%gs)); const startY=-((cam.y%gs));
      for(let x=startX;x<VIEW_W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,VIEW_H);ctx.stroke();}
      for(let y=startY;y<VIEW_H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(VIEW_W,y);ctx.stroke();}
      // 고스트 미리보기
      const snapX=Math.round(ghostX/gs)*gs;
      const snapY=Math.round(ghostY/gs)*gs;
      const [gsx,gsy]=toScreen(snapX,snapY);
      // 겹침 체크
      const newR2 = gPx/2;
      let blocked = dist({x:snapX,y:snapY}, state.castle) < newR2 + state.castle.r;
      if(!blocked) for(const b of state.buildings){
        const bR=(( b.gridSize||(b.type==='wall'?WALL_GRID_SIZE:BUILDING_GRID_SIZE))*GRID)/2;
        if(dist({x:snapX,y:snapY},b) < newR2+bR){ blocked=true; break; }
      }
      ctx.fillStyle = blocked ? 'rgba(255,50,50,0.3)' : 'rgba(100,200,255,0.25)';
      ctx.fillRect(gsx-gPx/2, gsy-gPx/2, gPx, gPx);
      ctx.strokeStyle = blocked ? 'rgba(255,50,50,0.9)' : 'rgba(100,200,255,0.8)'; ctx.lineWidth=2;
      ctx.strokeRect(gsx-gPx/2, gsy-gPx/2, gPx, gPx);
      ctx.fillStyle='#fff'; ctx.font='11px Courier New'; ctx.textAlign='center';
      ctx.fillText({wall:'🧱',bomb:'💣',arrow:'🏹',barracks:'🏠',ice:'❄️',electric:'⚡'}[placingType]||'?', gsx, gsy+4);
      // 취소 안내
      ctx.fillStyle='rgba(255,220,100,0.9)'; ctx.font='11px Courier New'; ctx.textAlign='center';
      ctx.fillText('탭해서 설치 | 뒤로가기로 취소', VIEW_W/2, 20);
    }
    Object.values(remoteStates).forEach(rp=>{
      if(!rp.x) return;
      const pidx=rp.idx||0;
      const pcolor=PLAYER_COLORS[pidx];
      // 부드러운 위치 보간
      if(!rp._rx){ rp._rx=rp.x; rp._ry=rp.y; }
      rp._rx += (rp.x - rp._rx) * 0.3;
      rp._ry += (rp.y - rp._ry) * 0.3;
      // 다른 플레이어 캐릭터 (보간 위치 사용)
      if(inView(rp._rx,rp._ry,20)){
        const [sx2,sy3]=toScreen(rp._rx,rp._ry);
        drawPlayer(sx2,sy3,14,pcolor);
        ctx.fillStyle=pcolor;ctx.font='9px Courier New';ctx.textAlign='center';
        ctx.fillText(PLAYER_NAMES[pidx],sx2,sy3-20);
      }
      // 다른 플레이어 병사
      if(rp.soldiers) rp.soldiers.forEach(s=>{
        if(!inView(s.x,s.y,10))return;
        const [sx2,sy3]=toScreen(s.x,s.y);
        ctx.fillStyle=pcolor;ctx.beginPath();ctx.arc(sx2,sy3,6,0,Math.PI*2);ctx.fill();
      });
      // 다른 플레이어 건물
      if(rp.buildings) rp.buildings.forEach(b=>{
        if(!inView(b.x,b.y,10))return;
        const [sx2,sy3]=toScreen(b.x,b.y);
        ctx.fillStyle=pcolor+'88';ctx.fillRect(sx2-10,sy3-10,20,20);
        ctx.strokeStyle=pcolor;ctx.lineWidth=1;ctx.strokeRect(sx2-10,sy3-10,20,20);
      });
    });

    // 내 성
    const [csx,csy]=toScreen(state.castle.x,state.castle.y);
    if(inView(state.castle.x,state.castle.y,100)){
      drawCastle(csx,csy,state.castle.r,state.castle.hp,state.castle.maxHp,state.castle.alive,PLAYER_COLORS[myIdx]);
      if(state.castle.alive){
        ctx.save();ctx.strokeStyle='rgba(100,255,100,0.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.arc(csx,csy,120,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
      }
      ctx.fillStyle='#ffcc44';ctx.font='bold 11px Courier New';ctx.textAlign='center';
      ctx.fillText(`🏰 공유 성 Lv.${state.castle.level}`,csx,csy-state.castle.r-25);
    }

    // 금광 그리기
    state.goldMines.forEach(g=>{
      if(!inView(g.x,g.y,30)) return;
      const [gx,gy]=toScreen(g.x,g.y);
      const glow = Math.sin((g.glowTimer||0)*0.1)*0.4+0.6; // 0.2~1.0 반짝임
      ctx.save();
      // 빛나는 원
      ctx.shadowBlur=20*glow;
      ctx.shadowColor='#ffd700';
      ctx.globalAlpha=glow;
      ctx.beginPath();ctx.arc(gx,gy,18,0,Math.PI*2);
      ctx.fillStyle='#ffaa00';ctx.fill();
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.stroke();
      ctx.globalAlpha=1;
      ctx.shadowBlur=0;
      // 금광 아이콘
      ctx.font='18px serif';ctx.textAlign='center';
      ctx.fillText('💰',gx,gy+6);
      // 코인 표시
      ctx.fillStyle='#ffd700';ctx.font='bold 9px Courier New';
      ctx.fillText(`+${g.reward}🪙`,gx,gy-22);
      ctx.restore();
    });

    // 건물
    state.buildings.forEach(b=>{
      if(!inView(b.x,b.y))return;
      const [sx2,sy3]=toScreen(b.x,b.y);
      const gridSize = b.gridSize || (b.type==='wall' ? WALL_GRID_SIZE : BUILDING_GRID_SIZE);
      const gPx = gridSize * GRID;
      const bc={wall:'#8899aa',bomb:'#556677',arrow:'#886644',barracks:'#667788',ice:'#44aacc',electric:'#aaaa22'};
      ctx.fillStyle=bc[b.type]||'#888';
      ctx.fillRect(sx2-gPx/2, sy3-gPx/2, gPx, gPx);
      ctx.strokeStyle='#334'; ctx.lineWidth=1.5;
      ctx.strokeRect(sx2-gPx/2, sy3-gPx/2, gPx, gPx);
      if(b.type==='wall'){
        ctx.strokeStyle='#667788'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(sx2, sy3-gPx/2); ctx.lineTo(sx2, sy3+gPx/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx2-gPx/2, sy3); ctx.lineTo(sx2+gPx/2, sy3); ctx.stroke();
      }
      drawHpBar(sx2, sy3+gPx/2+2, gPx, b.hp, b.maxHp);
      ctx.fillStyle='#fff'; ctx.font='14px serif'; ctx.textAlign='center';
      ctx.fillText({wall:'🧱',bomb:'💣',arrow:'🏹',barracks:'🏠',ice:'❄️',electric:'⚡'}[b.type]||'?', sx2, sy3+5);
      if(b.level>1){ ctx.fillStyle='#ffcc44'; ctx.font='9px Courier New'; ctx.fillText(`Lv.${b.level}`, sx2+gPx/2-8, sy3-gPx/2+10); }
    });

    // 몬스터
    state.monsters.forEach(m=>{
      if(!inView(m.x,m.y))return;
      const [sx2,sy3]=toScreen(m.x,m.y);
      const r=m.r;
      if(m.type==='slime') drawSlime(sx2,sy3,r,m.color,'normal');
      else if(m.type==='swordslime') drawSlime(sx2,sy3,r,m.color,'sword');
      else if(m.type==='fireslime') drawSlime(sx2,sy3,r,m.color,'fire');
      else if(m.type==='bat') drawBat(sx2,sy3,r);
      else if(m.type==='golem') drawGolem(sx2,sy3,r);
      else if(m.type==='dragon') drawDragon(sx2,sy3,r);
      drawHpBar(sx2,sy3-r-8,r*1.8,m.hp,m.maxHp);
      // 얼음/전기 상태 표시
      if(m.frozen>0){ctx.save();ctx.strokeStyle='#88ddff';ctx.lineWidth=2;ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(sx2,sy3,r+3,0,Math.PI*2);ctx.stroke();ctx.restore();}
      if(m.shocked>0){ctx.save();ctx.strokeStyle='#ffff44';ctx.lineWidth=2;ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(sx2,sy3,r+3,0,Math.PI*2);ctx.stroke();ctx.restore();}
    });

    // 병사
    state.soldiers.forEach(s=>{
      if(!inView(s.x,s.y))return;
      const [sx2,sy3]=toScreen(s.x,s.y);
      drawSoldier(sx2,sy3,12,s.type);
      drawHpBar(sx2,sy3-18,20,s.hp,s.maxHp);
    });

    // 투사체
    state.projectiles.forEach(proj=>{
      if(!inView(proj.x,proj.y,10))return;
      const [sx2,sy3]=toScreen(proj.x,proj.y);
      ctx.save();ctx.fillStyle=proj.owner==='player'?'#88ddff':proj.aoe?'#ff8800':'#ffdd44';
      ctx.shadowBlur=4;ctx.shadowColor=ctx.fillStyle;
      ctx.beginPath();ctx.arc(sx2,sy3,proj.aoe?5:3,0,Math.PI*2);ctx.fill();ctx.restore();
    });

    // 파티클
    state.particles.forEach(pt=>{
      if(!inView(pt.x,pt.y,10))return;
      const [sx2,sy3]=toScreen(pt.x,pt.y);
      ctx.save();ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;
      ctx.beginPath();ctx.arc(sx2,sy3,3,0,Math.PI*2);ctx.fill();ctx.restore();
    });

    // 내 플레이어
    const [psx,psy]=toScreen(state.player.x,state.player.y);
    drawPlayer(psx,psy,16,PLAYER_COLORS[myIdx]);
    drawHpBar(psx,psy-28,28,state.player.hp,state.player.maxHp);

    // 미니맵
    mCtx.fillStyle='#0a1a0a';mCtx.fillRect(0,0,MINI,MINI);
    // 공유 성 (중앙)
    mCtx.fillStyle='#ffcc44';
    mCtx.fillRect(CASTLE_X*SCALE-4,CASTLE_Y*SCALE-4,8,8);
    mCtx.fillStyle='#fff';mCtx.font='8px serif';mCtx.textAlign='center';
    mCtx.fillText('🏰',CASTLE_X*SCALE,CASTLE_Y*SCALE+3);
    // 다른 플레이어
    Object.values(remoteStates).forEach(rp=>{
      if(rp.x){
        mCtx.fillStyle=PLAYER_COLORS[rp.idx||0];
        mCtx.beginPath();mCtx.arc(rp.x*SCALE,rp.y*SCALE,2,0,Math.PI*2);mCtx.fill();
      }
    });
    // 금광 미니맵
    state.goldMines.forEach(g=>{
      mCtx.fillStyle='#ffd700';
      mCtx.beginPath();mCtx.arc(g.x*SCALE,g.y*SCALE,3,0,Math.PI*2);mCtx.fill();
    });
    // 몬스터
    state.monsters.forEach(m=>{mCtx.fillStyle=m.flying?'#aa88ff':'#ff4444';mCtx.fillRect(m.x*SCALE-1,m.y*SCALE-1,2,2);});
    // 내 플레이어
    mCtx.fillStyle='#fff';mCtx.beginPath();mCtx.arc(state.player.x*SCALE,state.player.y*SCALE,2.5,0,Math.PI*2);mCtx.fill();
    // 뷰포트
    mCtx.strokeStyle='rgba(255,255,255,0.4)';mCtx.lineWidth=0.5;
    mCtx.strokeRect(cam.x*SCALE,cam.y*SCALE,VIEW_W*SCALE,VIEW_H*SCALE);
  }

  // 키보드
  window.addEventListener('keydown',e=>{ state.player.keys[e.key.toLowerCase()]=true; if(e.key==='Escape')document.getElementById('ctxMenu').style.display='none'; });
  window.addEventListener('keyup',e=>{ state.player.keys[e.key.toLowerCase()]=false; });
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const scaleX=500/rect.width, scaleY=500/rect.height;
    const mx=(e.clientX-rect.left)*scaleX+state.camera.x;
    const my=(e.clientY-rect.top)*scaleY+state.camera.y;

    // 배치 모드일 때
    if(placingType){
      placeBuilding(mx, my);
      return;
    }

    // 병사 클릭 → 삭제 확인
    for(let i=0;i<state.soldiers.length;i++){
      const s=state.soldiers[i];
      if(dist({x:mx,y:my},s)<18){
        if(confirm(`${s.type} 병사를 해고할까요? (코인 환급 없음)`)){
          state.soldiers.splice(i,1);
          addMsg('병사 해고!','#faa');
        }
        return;
      }
    }
    // 건물 클릭 → 업그레이드 or 삭제
    for(let i=0;i<state.buildings.length;i++){
      const b=state.buildings[i];
      if(dist({x:mx,y:my},b)<25){
        const maxLv=state.castle.level;
        const bLv=b.level||1;
        const upgCost=bLv*20;
        const options = bLv < maxLv
          ? `업그레이드 Lv.${bLv+1} (${upgCost}🪙) / 철거`
          : `철거 (최대레벨)`;
        const choice = confirm(`${b.type} 건물 Lv.${bLv}\n\n확인=업그레이드(${upgCost}🪙)\n취소=철거`);
        if(choice){
          upgradeBuilding(b);
        } else {
          if(confirm('정말 철거하시겠어요?')) state.buildings.splice(i,1);
        }
        return;
      }
    }
    // 내 성 클릭
    if(dist({x:mx,y:my},state.castle)<state.castle.r+10&&state.castle.alive){ hire('castle');return; }
    // 내 플레이어 클릭
    if(dist({x:mx,y:my},state.player)<25){ hire('follow');return; }
    document.getElementById('ctxMenu').style.display='none';
  });
  // 배치 미리보기 위치 업데이트
  function updateGhost(e){
    if(!placingType) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=500/rect.width, scaleY=500/rect.height;
    const src=e.touches?e.touches[0]:e;
    ghostX=(src.clientX-rect.left)*scaleX+state.camera.x;
    ghostY=(src.clientY-rect.top)*scaleY+state.camera.y;
  }
  canvas.addEventListener('mousemove', updateGhost);
  canvas.addEventListener('touchmove', updateGhost, {passive:true});

  document.addEventListener('click',e=>{ if(!e.target.closest('#ctxMenu')&&!e.target.closest('#shopPanel')) document.getElementById('ctxMenu').style.display='none'; });

  // joystick 위치 조정
  function reposJoy(){
    const shop=document.getElementById('shopPanel');
    if(shop) document.getElementById('joystickZone').style.bottom=(shop.offsetHeight+8)+'px';
  }
  reposJoy(); window.addEventListener('resize',reposJoy); setTimeout(reposJoy,300);

  return { update, draw, state, buyAtkSpd, hire, hireSoldier, buyBuilding, upgradeCastle, upgradeBuilding, updateCastleBtn };
}
</script>
</body>
</html>
